# vericlaim gate configuration.
# The gate applies Claim-Oriented Programming to THIS repository (dogfooding):
# every number the docs state about vericlaim or its example is bound to the
# claim register and verified in CI.

[vericlaim]
register        = "claims/register.yaml"
baseline        = "claims/baseline.json"
manifest        = "claims/manifest.md"
doc_globs       = ["README.md", "docs/*.md", "examples/*/docs/*.md"]
required_fields = ["id", "statement", "evidence_level", "artifact", "caveat"]
# Ordered weakest -> strongest. Projects tailor this to their domain.
evidence_levels = ["theoretical", "measured", "benchmarked", "reproduced", "externally_validated"]
# Require a provenance sidecar for every artifact (how it was produced).
require_provenance = true
# The taxonomy doc legitimately pairs claim ids with level names in examples.
evidence_exclude = ["docs/evidence-levels.md"]
stale_exclude    = []

# A denylist of strings that were corrected and must never reappear.
# Populate this as you fix drift; each entry: "forbidden" = "why / use instead".
[vericlaim.stale_strings]
