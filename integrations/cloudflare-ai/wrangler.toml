# vericlaim Cloudflare AI add-on — Worker configuration.
# OPTIONAL. Deploy only if you want AI search / MCP over your claim register.
name = "vericlaim-claims"
main = "src/index.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

# Workers AI — runs the embedding model (@cf/baai/bge-base-en-v1.5, 768 dims).
[ai]
binding = "AI"

# Vectorize — the vector database that stores one vector per claim.
# Create it first:  npx wrangler vectorize create vericlaim-claims --dimensions=768 --metric=cosine
# Project claims and library bundles share this index; searchClaims/oracle
# filter to kind="claim". Create the metadata index once:
#   npx wrangler vectorize create-metadata-index vericlaim-claims \
#       --property-name=kind --type=string
[[vectorize]]
binding = "VECTORIZE"
index_name = "vericlaim-claims"

# Vectorize — the research layer's chunk-level literature index.
# Create it first:  npx wrangler vectorize create vericlaim-literature --dimensions=768 --metric=cosine
[[vectorize]]
binding = "VECTORIZE_LIT"
index_name = "vericlaim-literature"

# D1 — the tamper-evident, hash-chained claim ledger (history of every claim).
# NEW USER: run ./setup.sh — it creates your own D1 and rewrites the id below.
# (The id here is the original author's database; you cannot deploy against it.)
[[d1_databases]]
binding = "DB"
database_name = "vericlaim-ledger"
database_id = "3d1a3560-f5f3-48bd-a761-53a7f27996d1"

# R2 — the content-addressed evidence vault (artifact bytes keyed by SHA-256).
# Create it first:  npx wrangler r2 bucket create vericlaim-evidence
[[r2_buckets]]
binding = "EVIDENCE"
bucket_name = "vericlaim-evidence"

# Durable Object backing the optional MCP agent.
[[durable_objects.bindings]]
name = "VERICLAIM_MCP"
class_name = "VericlaimMCP"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["VericlaimMCP"]

[vars]
# Set to "true" to expose the MCP endpoint at POST /mcp. Off by default.
# (Enable it, redeploy, then: claude mcp add --transport http --scope user \
#  vericlaim-claims https://<your-worker>.workers.dev/mcp )
ENABLE_MCP = "false"

# The Agents SDK client bundle has a dynamic import("ai") we never execute (we
# only use agents/mcp). Alias it to a local stub so the bundler can resolve it.
[alias]
ai = "./src/stub-ai.js"

# Secrets (set with `npx wrangler secret put <NAME>`, never commit them):
#   INDEX_TOKEN   bearer token required to call POST /index (rebuild the index)
