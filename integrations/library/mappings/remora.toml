# Harvest mapping for REMORA-research -> the vericlaim claims library.
#
# The level map is curation policy, written down: REMORA's evidence taxonomy
# translated to vericlaim's ladder, never upgrading. Sources:
# REMORA docs/assurance/claim_register_v1.yaml taxonomy vs docs/evidence-levels.md.

repo = "github.com/darklordVirtual/REMORA-research"
register = "docs/assurance/claim_register_v1.yaml"
# REMORA's own claim gate must be green or the harvest refuses.
gate_cmd = "python3 scripts/check_claim_provenance.py"

# REMORA level -> vericlaim level. Never an upgrade:
# - externally_benchmarked earns externally_validated (third-party dataset),
#   the run itself was in-house — the caveat carries that scope.
# - regression_tested is a benchmarked-grade result on a fixed historical set.
# - internal_simulation is a single in-house observation -> measured.
[level_map]
internal_benchmark = "benchmarked"
externally_benchmarked = "externally_validated"
regression_tested = "benchmarked"
internal_simulation = "measured"
theoretical = "theoretical"

# Withdrawn or out-of-scope material is excluded by claim id. (REMORA's
# withdrawn MaxEnt derivation is a module, not a register claim, so nothing
# to exclude in round 1 — the mechanism stays for future rounds.)
exclude = []

caveat_extra = "Harvested from REMORA-research@{commit} (source claim gate green at harvest). Source project is SHADOW_ONLY research-grade; independent human review (REM-021) pending at harvest time — grading reflects the source's own evidence taxonomy, mapped conservatively."

[literature]
CLAIM-002 = ["lit/claim-002-agentharm.md"]
CLAIM-009 = ["lit/claim-009-external-datasets.md"]
CLAIM-011 = ["lit/claim-011-confidence-sequences.md"]
