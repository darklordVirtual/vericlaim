name: Claim Gate

# Claim-Oriented Programming enforcement. This workflow is the executable
# contract: it fails the build if any claim drifts from its committed evidence
# or if the docs drift from the claim register. Runs on every push and PR.

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  gate:
    name: Vericlaim gate + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install (dev)
        run: pip install -e ".[dev]"

      - name: Claim gate (artifacts exist, provenance present, docs bound)
        run: python -m vericlaim

      - name: Reproduce oracle (every registered number still holds)
        run: python -m vericlaim reproduce

      - name: Tests
        run: pytest -q

      - name: Lint
        run: ruff check .
