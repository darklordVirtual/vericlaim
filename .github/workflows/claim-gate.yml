name: Claim Gate

# Claim-Oriented Programming enforcement — the executable contract. If any claim
# drifts from its committed evidence, the docs drift from the register, the
# project's own version drifts, or a registered number stops reproducing, the
# build fails with the exact file:line. Runs on every push and PR.
#
# Hardened for reproducibility: Actions are SHA-pinned (a moving tag can change
# under you), the dev toolchain is version-locked (.github/requirements-ci.txt),
# and the gate runs on every supported Python (3.11+, per pyproject). Two jobs:
#   gate      — SIDE-EFFECT-FREE (gate + tests + lint), matrixed over Python.
#   reproduce — EXECUTES each reproduce script; separated from any deploy secret.

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: claim-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: Gate + tests + lint (py ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ matrix.python }}
      - name: Install (package + pinned dev toolchain)
        run: |
          python -m pip install -e .
          python -m pip install -r .github/requirements-ci.txt
      - name: Claim gate — artifacts exist, provenance present, docs + code bound
        run: python -m vericlaim
      - name: Tests (incl. drift-detection + version-consistency + handbook)
        run: pytest -q
      - name: Lint
        run: ruff check .

  reproduce:
    name: Reproduce oracle (every number still true today)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
      - name: Install (package + pinned dev toolchain)
        run: |
          python -m pip install -e .
          python -m pip install -r .github/requirements-ci.txt
      - name: Reproduce — re-run each evidence script, artifact must be byte-identical
        run: python -m vericlaim reproduce
