---
# vericlaim claim register — the single source of truth for every claim this
# repository makes about itself and its example. Update NUMBERS HERE FIRST; the
# gate then fails any doc paragraph whose anchored value no longer matches.
#
# Required per claim: id, statement, evidence_level, artifact, caveat.
# Optional: n, metrics (machine-readable numbers that docs bind to via anchors).
# Evidence levels (weakest -> strongest): see docs/evidence-levels.md and
# vericlaim.toml.

schema_version: "1"

claims:

  - id: CLAIM-META-001
    statement: >
      vericlaim's own version is single-sourced from vericlaim/__init__.py and
      is 0.4.0; pyproject.toml derives it (hatch), and CITATION.cff, the README
      and the package metadata are held identical to it by
      tests/test_version_consistency.py. The tool refuses to let its own
      version drift — the failure it exists to prevent.
    evidence_level: measured
    artifact:
      - "claims/version.json"
    metrics:
      version: "0.4.0"
    caveat: >
      "Single-sourced" means __init__.__version__ is authoritative and every
      other occurrence is checked equal to it by the test suite and this bound
      README line. It asserts consistency, not that 0.4.0 is the "right" release
      number — that is the maintainer's call, bumped in one place.
    reproduce: "python3 tools/version_evidence.py"

  - id: CLAIM-CORE-001
    statement: >
      The vericlaim gate has zero third-party runtime dependencies: it runs on
      a stdlib-only Python 3.11+ and pulls in nothing that could compromise the
      thing verifying your build.
    evidence_level: measured
    artifact:
      - "pyproject.toml"
      - "vericlaim/register.py"
    metrics:
      runtime_dependencies: 0
    caveat: >
      "Zero runtime dependencies" covers the gate itself. PyYAML is used only if
      already present (optional); the bundled parser is the default. Test/dev
      tooling (pytest) is a dev dependency, not a runtime one.

  - id: CLAIM-EX-001
    statement: >
      On the fixed example corpus, the run-length encoder achieves an overall
      compression ratio of 8.0584x across 4 files.
    evidence_level: benchmarked
    artifact:
      - "examples/rle/artifacts/rle_bench.json"
    n: 4
    metrics:
      overall_ratio: 8.0584
    caveat: >
      Corpus is hand-picked to contain the run structure RLE exploits; this is a
      demonstration of Claim-Oriented Programming, not a general compression
      result. On real-world data with few runs, RLE can EXPAND the input.
    reproduce: "python3 examples/rle/bench.py"

  - id: CLAIM-EX-002
    statement: >
      Encoding then decoding is lossless: all 4 example files round-trip to the
      original bytes exactly.
    evidence_level: benchmarked
    artifact:
      - "examples/rle/artifacts/rle_bench.json"
    metrics:
      n_roundtrip_lossless: 4
    caveat: >
      Verified on the 4-file example corpus only. The property test in
      tests/test_rle_example.py exercises additional inputs, but a formal
      round-trip proof over all byte strings is not claimed here.
    reproduce: "python3 examples/rle/bench.py"

  - id: CLAIM-GREET-001
    statement: >
      The greetings example library supports 6 languages (English, Norwegian,
      Spanish, French, German, Japanese).
    evidence_level: measured
    artifact:
      - "examples/greetings/artifacts/greetings.json"
    metrics:
      n_languages: 6
    caveat: >
      A capability count for the example library only — a demonstration of a
      non-numeric claim shape, not a general i18n solution. "Support" means a
      greeting string exists; it makes no claim about grammar or locale rules.
    reproduce: "python3 examples/greetings/evidence.py"

  - id: CLAIM-THM-001
    statement: >
      The committed 5-step Hilbert-system derivation of p -> p (Lukasiewicz
      axioms A1-A2, modus ponens) is machine-checked: every step verifies as an
      axiom instance or a modus-ponens application, and the final step equals
      the declared theorem.
    evidence_level: machine_checked
    artifact:
      - "examples/theorem/artifacts/theorem.json"
    n: 5
    metrics:
      steps_verified: 5
    caveat: >
      Machine-checked by the example's own ~100-line checker, not by an
      independently audited kernel (Lean/Coq); the checker itself is
      property-tested in tests/test_theorem_example.py. The claim covers this
      one derivation only, not completeness of the axiom system.
    literature:
      - source: "Lukasiewicz, Elementy logiki matematycznej (1929); Mendelson, Introduction to Mathematical Logic 6e, Lemma 1.8"
        sha256: fc28b762fe62f0cb2d39af37e4ffa9d43b4178a5096bdcb2dfd61d50b4c54047
        file: "docs/references/lukasiewicz-axioms.md"
        locator: "axioms A1-A3; the p -> p derivation"
    reproduce: "python3 examples/theorem/evidence.py"

  - id: CLAIM-TIP-001
    statement: >
      All 12 reference bills in the tip-calculator example produce the expected
      total to the cent.
    evidence_level: benchmarked
    artifact:
      - "examples/tipcalc/artifacts/tipcalc.json"
    n: 12
    metrics:
      cases_passing: 12
      cases_total: 12
    caveat: >
      Correctness on a fixed 12-case reference set chosen to avoid rounding-
      boundary ambiguity. It is not a proof of correctness over all bills and
      tip rates; floating-point rounding can differ on half-cent boundaries.
    reproduce: "python3 examples/tipcalc/evidence.py"

  - id: CLAIM-LIB-RAG-001
    statement: >
      The canonical research map (integrations/library/research/canon.toml)
      contains 180 works across 15 collections; 171 are verified into the
      hash-locked literature catalog (registrar metadata or explicit web
      snapshot) and the remaining 9 are documented drops with reasons —
      0 undocumented gaps.
    evidence_level: measured
    artifact:
      - "integrations/library/artifacts/research_layer.json"
    metrics:
      canon_total: 180
      canon_verified: 171
      canon_dropped: 9
      undocumented_gaps: 0
    caveat: >
      "Verified" means the title+author+year guard bound a registrar record,
      or a curator snapshotted an explicit URL (tier "web-snapshot",
      accredited=false). It proves the work is cataloged and hash-locked —
      never that the work's content is true.
    reproduce: "python3 integrations/library/evidence_research_layer.py"

  - id: CLAIM-LIB-RAG-002
    statement: >
      All 180 catalog works are deterministically chunked into 9805
      content-addressed chunks, and 9805 of 9805 chunks are recorded as
      pushed to the live research index.
    evidence_level: measured
    artifact:
      - "integrations/library/artifacts/research_layer.json"
    metrics:
      catalog_works: 180
      chunks_total: 9805
      chunks_pushed: 9805
    caveat: >
      "Pushed" is what the committed push manifest records; the live index
      is a mirror that can lag the catalog until the next push. Full text is
      fetched only for open arXiv HTML renderings — other works are chunked
      from registrar abstracts or page snapshots (the hybrid content policy).
      NOTE — this catalog's 180 works are NOT the same set as CLAIM-LIB-RAG-001's
      180 canon works: the catalog additionally contains works harvested from
      external bibliographies that lie outside the canonical coverage map,
      including a known registrar false-match (doi:10.1109/ijcnn.1989.118324, a
      1989 sensor-calibration record) and some unvetted recent-arXiv works. All
      catalog text is retrieval-only and hash-locked, never evidence; the
      false-match is a tracked defect flagged for removal — see
      integrations/library/KNOWN_ISSUES.md.
    reproduce: "python3 integrations/library/evidence_research_layer.py"

  - id: CLAIM-LIB-RAG-003
    statement: >
      A live round-trip against the deployed Worker on 2026-07-06 passed all
      checks, including: research search finds Conformal Risk Control, the
      research oracle answers a supported question with work-id citations,
      and it refuses an off-corpus question.
    evidence_level: measured
    artifact:
      - "integrations/cloudflare-ai/test/artifacts/research_live.json"
    metrics:
      all_passed: 1
    caveat: >
      A dated snapshot of a live deployment — not reproducible offline and
      not re-run by `vericlaim reproduce`. The refusal check proves the
      oracle refused one off-corpus question that day, not that it can never
      be induced to overclaim.

  # ── domains/: applied knowledge modules (each a real, reproduce-backed
  # artifact demonstrating a domain technique — evidence, not roadmap). ──

  - id: CLAIM-EVAL-001
    statement: >
      The eval-harness domain scores a committed system-under-test against a
      10-case gold standard, reporting micro-averaged grounding F1 of 0.9 and
      refusal accuracy of 0.6667 (2 of 3 off-corpus questions correctly refused).
    evidence_level: benchmarked
    artifact:
      - "domains/eval_harness/artifacts/eval_report.json"
    n: 10
    metrics:
      n_cases: 10
      grounding_f1: 0.9
      refusal_accuracy: 0.6667
    caveat: >
      A fixed gold set and a fixed, deliberately-imperfect answer set exercise
      the SCORER (citation precision/recall/F1 + refusal accuracy) — not any
      live model. The numbers grade the harness, not an LLM; point it at real
      oracle outputs to grade them.
    reproduce: "python3 domains/eval_harness/evidence.py"

  - id: CLAIM-GRAPH-001
    statement: >
      The evidence-graph domain models a claim register as a directed graph
      (18 nodes, 15 edges across 6 claims) and proves an integrity property a
      flat list cannot express: 0 orphan claims — every claim is backed by at
      least one artifact.
    evidence_level: measured
    artifact:
      - "domains/evidence_graph/artifacts/graph.json"
    metrics:
      n_nodes: 18
      n_edges: 15
      orphan_claims: 0
    caveat: >
      Built over a committed fixture (data/sample_claims.json), not the live
      register, so the counts stay byte-stable. The same builder runs on a real
      register exported to the same node/edge shape.
    reproduce: "python3 domains/evidence_graph/evidence.py"

  - id: CLAIM-TENANT-001
    statement: >
      The multi-tenant domain models tenant isolation with a row-scoped store
      and one hash chain per tenant; across 5 tenants a battery of 85 isolation
      checks finds 0 cross-tenant leaks (and 0 chain forks).
    evidence_level: benchmarked
    artifact:
      - "domains/multitenant/artifacts/isolation_report.json"
    metrics:
      n_tenants: 5
      n_isolation_checks: 85
      cross_tenant_leaks: 0
    caveat: >
      Models the isolation invariant in memory only — no authn, transport, or
      persistence. It proves the scoping/chaining logic is sound; a real SaaS
      must still enforce the same boundary at the auth and storage layers.
    reproduce: "python3 domains/multitenant/evidence.py"

  - id: CLAIM-ONTO-001
    statement: >
      The ontology domain defines a machine-readable claim ontology (6 ordered
      evidence levels, 5 claim types) and validates a register against it: over
      a 6-claim fixture, 0 claims are non-conforming.
    evidence_level: measured
    artifact:
      - "domains/ontologies/artifacts/ontology_conformance.json"
    metrics:
      n_levels: 6
      n_claim_types: 5
      nonconforming: 0
    caveat: >
      The taxonomy is a PROPOSAL, not a standard, and conformance is checked
      over a committed fixture (data/sample_register.json). It demonstrates
      ontology-driven validation, not that this vocabulary is canonical.
    reproduce: "python3 domains/ontologies/evidence.py"

  - id: CLAIM-ROUTE-001
    statement: >
      The cost-aware routing domain routes 8 requests over a 4-model catalogue
      to the cheapest model clearing each request's quality floor, achieving a
      savings ratio of 0.8059 versus an always-premium baseline with 0 quality
      violations.
    evidence_level: benchmarked
    artifact:
      - "domains/cost_routing/artifacts/routing_report.json"
    metrics:
      n_requests: 8
      savings_ratio: 0.8059
      quality_violations: 0
    caveat: >
      The price table, quality scores and workload are SYNTHETIC and fixed. It
      demonstrates the routing policy and its saving/soundness guarantees, not
      real model prices or real model quality.
    reproduce: "python3 domains/cost_routing/evidence.py"
