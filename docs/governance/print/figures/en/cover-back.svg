<text x="600.0" y="700.0" font-size="54" fill="#0C1E33" font-weight="800" text-anchor="middle">Governance you can attack,</text>
<text x="600.0" y="766.0" font-size="54" fill="#0C1E33" font-weight="800" text-anchor="middle">and still stand behind.</text>
<text x="600.0" y="860.0" font-size="32" fill="#4A5A6A" font-weight="500" text-anchor="middle">AI governance built as a system of checkable claims,</text>
<text x="600.0" y="912.0" font-size="32" fill="#4A5A6A" font-weight="500" text-anchor="middle">not a stack of reassuring documents. Every strong</text>
<text x="600.0" y="964.0" font-size="32" fill="#4A5A6A" font-weight="500" text-anchor="middle">statement is a registered claim at a stated evidence</text>
<text x="600.0" y="1016.0" font-size="32" fill="#4A5A6A" font-weight="500" text-anchor="middle">level, bound to committed evidence, checked on every</text>
<text x="600.0" y="1068.0" font-size="32" fill="#4A5A6A" font-weight="500" text-anchor="middle">commit. The book applies its own discipline to itself.</text>
<text x="600.0" y="1200.0" font-size="34" fill="#12B3A6" font-weight="700" text-anchor="middle" font-style="italic">The method is the point, not the numbers.</text>
