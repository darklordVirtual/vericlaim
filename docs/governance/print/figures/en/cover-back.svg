<text x="600.0" y="700.0" font-size="50" fill="#182530" font-weight="800" text-anchor="middle">Governance you can attack,</text>
<text x="600.0" y="762.0" font-size="50" fill="#182530" font-weight="800" text-anchor="middle">and still stand behind.</text>
<text x="600.0" y="866.0" font-size="30" fill="#57636D" font-weight="500" text-anchor="middle">AI governance built as a system of checkable claims,</text>
<text x="600.0" y="918.0" font-size="30" fill="#57636D" font-weight="500" text-anchor="middle">not a stack of reassuring documents. Every strong</text>
<text x="600.0" y="970.0" font-size="30" fill="#57636D" font-weight="500" text-anchor="middle">statement is a registered claim at a stated evidence</text>
<text x="600.0" y="1022.0" font-size="30" fill="#57636D" font-weight="500" text-anchor="middle">level, bound to committed evidence, checked on every</text>
<text x="600.0" y="1074.0" font-size="30" fill="#57636D" font-weight="500" text-anchor="middle">commit. The book applies its own discipline to itself.</text>
<text x="600.0" y="1206.0" font-size="33" fill="#1C6E62" font-weight="700" text-anchor="middle" font-style="italic">The method is the point, not the numbers.</text>
